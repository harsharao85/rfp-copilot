name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  infra:
    name: CDK synth + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx cdk synth --quiet

  lambdas:
    name: Python lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambdas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy .
      - run: pytest -v

